<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Fair QR Generator – Govt. ITI Hansi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #e8eef9 0%, #f0f4ff 60%, #e4eaf8 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 3rem 1rem 4rem;
  }

  .page-header {
    text-align: center;
    margin-bottom: 2.4rem;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a4fb5;
    color: #fff;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 1rem;
  }

  .header-badge svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }

  .page-header h1 {
    font-size: 2.1rem;
    font-weight: 800;
    color: #0f1d4a;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .page-header p {
    font-size: 1rem;
    color: #5b6b8a;
    margin-top: 0.5rem;
  }

  .card {
    background: #fff;
    text-align: center;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(26,47,101,0.12), 0 1px 4px rgba(26,47,101,0.06);
    padding: 2.4rem 2.4rem 2rem;
    max-width: 794px;
    width: 100%;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: #8fa0c4;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.4rem;
  }

  .field-group { margin-bottom: 1.4rem; }

  label {
    display: block;
    font-size: 0.88rem;
    font-weight: 600;
    color: #2d3a5e;
    margin-bottom: 7px;
  }

  input[type="date"] {
  width: 30%;
  padding: 12px 16px;
  border: 1.5px solid #dde4f2;
  border-radius: 10px;
  font-size: 0.97rem;
  font-family: inherit;
  color: #1a2040;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #f7f9ff;
}

input[type="url"] {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid #dde4f2;
  border-radius: 10px;
  font-size: 0.97rem;
  font-family: inherit;
  color: #1a2040;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #f7f9ff;
}

  input:focus {
    border-color: #1a4fb5;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26,79,181,0.10);
  }

  .btn-generate {
    width: 100%;
    background: #1a4fb5;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 0;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.18s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn-generate:hover { background: #1440a0; }
  .btn-generate:active { transform: scale(0.99); }

  .output-area { display: none; margin-top: 2rem; }
  .output-area.visible { display: block; }

  .divider {
    border: none;
    border-top: 1.5px solid #edf0f8;
    margin: 0 0 1.8rem;
  }

  /* ── Screen preview (matches print layout) ── */
  .preview-page {
    border: 3px dashed #1a4fb5;
    border-radius: 16px;
    outline: 2px solid #1a4fb5;
    outline-offset: -10px;
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fff;
    margin-bottom: 1.2rem;
  }

  .preview-sub {
    font-size: 3rem;
    font-weight: 500;
    color: #2d3a5e;
    text-align: center;
    margin-bottom: 0.3rem;
  }

  .preview-heading {
    font-family: 'JUST Sans Outline', 'Segoe UI', Arial, sans-serif;
    font-size: 10rem;
    font-weight: 500;
    color: #0f1d4a;
    text-align: center;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }

  .preview-date {
    font-size: 2rem;
    color: #1a4fb5;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1.8rem;
  }

  .preview-rule {
    width: 80px;
    border: none;
    border-top: 3px solid #1a4fb5;
    margin: 0 auto 2rem;
    border-radius: 4px;
  }

  .preview-qr-box {
    border: 2px solid #0f1d4a;
    border-radius: 14px;
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    background: #fff;
  }

  #qrcode canvas, #qrcode img { display: block; }

  .preview-scan-text {
    font-size: 1rem;
    font-weight: 700;
    color: #0f1d4a;
    text-align: center;
  }

  .btn-print {
    width: 100%;
    margin-top: 1.2rem;
    background: #0e8a45;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 0;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.18s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-print:hover { background: #0a7038; }
  .btn-print:active { transform: scale(0.99); }
  .btn-print svg { width: 18px; height: 18px; fill: #fff; }

  /* ===================== PRINT STYLES ===================== */
  @media print {
    @page { size: A4 portrait; margin: 14mm 18mm 14mm 18mm; }

    body { background: #fff !important; padding: 0 !important; display: block !important; }
    .card { display: none !important; }
    .page-header { display: none !important; }

    .print-page {
      display: flex !important;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 1.5rem;
      min-height: 260mm;
      width: 174mm;
      margin: 0 auto;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      border: 3px dashed #1a4fb5;
      border-radius: 16px;
      outline: 2px solid #1a4fb5;
      outline-offset: -10px;
    }

    .print-sub {
      font-size: 3rem;
      font-weight: 500;
      color: #2d3a5e;
      text-align: center;
      margin-bottom: 0.35rem;
    }

    .print-heading {
      font-family: 'JUST Sans Outline', 'Segoe UI', Arial, sans-serif;
      font-size: 10rem;
      font-weight: 500;
      color: #0f1d4a;
      text-align: center;
      line-height: 1.5;
      letter-spacing: -0.04em;
      margin-bottom: 0.7rem;
    }

    .print-date {
      font-size: 2rem;
      color: #1a4fb5;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2.2rem;
      letter-spacing: 0.02em;
    }

    .print-rule {
      width: 80px;
      border: none;
      border-top: 3px solid #1a4fb5;
      margin: 0 auto 2.4rem;
      border-radius: 4px;
    }

    .print-qr-box {
      border: 2.5px solid #0f1d4a;
      border-radius: 20px;
      padding: 2.2rem 2.8rem;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      background: #fff;
    }

    .print-qr-box #qrcode-print canvas,
    .print-qr-box #qrcode-print img { display: block; }

    .print-scan-text {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f1d4a;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .no-print { display: none !important; }
  }

  .print-page { display: none; }
</style>
</head>
<body>

<!-- PAGE HEADER -->
<div class="page-header no-print">
  <div class="header-badge">
    <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm-7 8.18V15l7 3.82 7-3.82v-3.82L12 15 5 11.18z"/></svg>
    Government ITI Hansi
  </div>
  <h1>Job Fair<br>QR Code Generator</h1>
  <p>Generate & print a scannable QR code for your participation form</p>
</div>

<!-- SCREEN CARD -->
<div class="card no-print">
  <div class="section-label">Event Details</div>

  <div class="field-group">
    <label for="fair-date">Date of Job Fair</label>
    <input type="date" id="fair-date">
  </div>

  <div class="field-group">
    <label for="form-link">Participation Form Link</label>
    <input type="url" id="form-link" placeholder="https://forms.example.com/registration">
  </div>

  <button class="btn-generate" onclick="generateQR()">Generate QR Code</button>

  <div class="output-area" id="output-area">
    <hr class="divider" style="margin-top:2rem;">
    <div class="preview-page">
      <div class="preview-sub">Government ITI Hansi</div>
      <div class="preview-heading">Job Fair</div>
      <div class="preview-date" id="preview-date-text"></div>
      <hr class="preview-rule">
      <div class="preview-qr-box">
        <div id="qrcode"></div>
        <div class="preview-scan-text">Scan to Register</div>
      </div>
    </div>
    <button class="btn-print" onclick="printQR()">
      <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
      Print QR Code (A4)
    </button>
  </div>
</div>

<!-- PRINT-ONLY PAGE -->
<div class="print-page" id="print-page">
  <div class="print-sub">Government ITI Hansi</div>
  <div class="print-heading">Job Fair</div>
  <div class="print-date" id="print-date-text"></div>
  <hr class="print-rule">
  <div class="print-qr-box">
    <div id="qrcode-print"></div>
    <div class="print-scan-text">Scan to Register</div>
  </div>
</div>

<script>
  var currentLink = '';

  function generateQR() {
    var date = document.getElementById('fair-date').value;
    var link = document.getElementById('form-link').value.trim();

    if (!link) { alert('Please enter the participation form link.'); return; }
    if (!link.startsWith('http://') && !link.startsWith('https://')) {
      link = 'https://' + link;
      document.getElementById('form-link').value = link;
    }

    currentLink = link;

    document.getElementById('qrcode').innerHTML = '';
    document.getElementById('qrcode-print').innerHTML = '';

    new QRCode(document.getElementById('qrcode'), {
      text: link, width: 240, height: 240,
      colorDark: '#0f1d4a', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    new QRCode(document.getElementById('qrcode-print'), {
      text: link, width: 340, height: 340,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    if (date) {
      var p = date.split('-');
      var m = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var formatted = p[2] + ' ' + m[+p[1]-1] + ' ' + p[0];
      document.getElementById('preview-date-text').textContent = formatted;
      document.getElementById('print-date-text').textContent = formatted;
    } else {
      document.getElementById('preview-date-text').textContent = '';
      document.getElementById('print-date-text').textContent = '';
    }

    document.getElementById('output-area').classList.add('visible');
  }

  function printQR() {
    if (!currentLink) { alert('Please generate a QR code first.'); return; }
    document.getElementById('print-page').style.display = 'flex';
    setTimeout(function() {
      window.print();
      setTimeout(function() {
        document.getElementById('print-page').style.display = 'none';
      }, 1200);
    }, 350);
  }
</script>
</body>
</html>
