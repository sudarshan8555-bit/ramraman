<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live HTML Editor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            box-sizing: border-box; font-family: sans-serif; overflow: hidden;
        }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        .editor-pane {
            width: 50%; height: 100%; position: relative;
            background-color: #f9f9f9; user-select: none; 
        }

        /* NEW: Grouped Action Buttons */
        .action-buttons {
            position: absolute; bottom: 25px; right: 25px; z-index: 100; 
            display: flex; gap: 10px;
        }

        .floating-btn {
            background-color: #1a73e8; color: white; border: none;
            padding: 10px 16px; border-radius: 20px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); cursor: pointer;
            font-size: 13px; font-weight: bold;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .floating-btn:hover { 
            background-color: #1557b0; transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .floating-btn.secondary {
            background-color: #34a853; /* Green for Beautify */
        }
        .floating-btn.secondary:hover {
            background-color: #2b8c46;
        }

        .render-pane { flex: 1; height: 100%; position: relative; }
        
        .resizer {
            width: 8px; background-color: #ccc; cursor: col-resize;
            z-index: 10; transition: background-color 0.2s;
        }
        .resizer:hover, .resizer:active { background-color: #a0a0a0; }

        .CodeMirror {
            height: 100% !important; width: 100% !important;
            font-size: 15px; font-family: Consolas, "Courier New", monospace;
        }
        
        .CodeMirror-foldgutter { width: 15px; }
        .CodeMirror-foldmarker {
            color: #1a73e8; text-shadow: none; font-family: sans-serif;
            padding: 0 4px; cursor: pointer;
        }
        
        iframe {
            width: 100%; height: 100%; border: none;
            display: block; background-color: #ffffff;
        }
        
        .CodeMirror-hints { font-family: Consolas, "Courier New", monospace; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="editor-pane" id="editor-pane">
            
            <div class="action-buttons">
                <button class="floating-btn secondary" id="beautify-btn">✨ Beautify</button>
                <button class="floating-btn" id="download-btn">⬇ Download</button>
            </div>

            <textarea id="code-editor"></textarea>
        </div>
        
        <div class="resizer" id="resizer"></div>
        
        <div class="render-pane" id="render-pane">
            <iframe id="preview-frame"></iframe>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/brace-fold.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/xml-fold.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/xml-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/html-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/css-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/javascript-hint.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@emmetio/codemirror-plugin@2.0.0/dist/emmet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>

    <script>
        // 1. Context-Aware Autocomplete
        const origHtmlHint = CodeMirror.hint.html;
        CodeMirror.hint.html = function(cm, options) {
            const hints = origHtmlHint(cm, options);
            if (hints && hints.list) {
                for (let i = 0; i < hints.list.length; i++) {
                    let hintObj = hints.list[i];
                    let text = typeof hintObj === 'string' ? hintObj : hintObj.text;
                    let cleanText = text.replace(/[<>]/g, ''); 
                    
                    hints.list[i] = {
                        text: text,
                        displayText: text,
                        hint: function(cm, data, completion) {
                            let from = completion.from || data.from;
                            let to = completion.to || data.to;
                            let lineStr = cm.getLine(from.line);
                            let textBeingReplaced = lineStr.substring(from.ch, to.ch);
                            let charBeforeFrom = from.ch > 0 ? lineStr.charAt(from.ch - 1) : '';
                            let charAfterTo = to.ch < lineStr.length ? lineStr.charAt(to.ch) : '';
                            
                            let isTag = textBeingReplaced.startsWith('<') || charBeforeFrom === '<';
                            
                            if (isTag) {
                                let startPos = textBeingReplaced.startsWith('<') ? from : CodeMirror.Pos(from.line, from.ch - 1);
                                cm.replaceRange("<" + cleanText + ">", startPos, to);
                                let cursor = cm.getCursor();
                                const voidElements = ["area", "base", "br", "col", "embed", "hr", "img", "input", "link", "meta", "param", "source", "track", "wbr"];
                                if (!voidElements.includes(cleanText.toLowerCase())) {
                                    cm.replaceRange("</" + cleanText + ">", cursor);
                                }
                                cm.setCursor(cursor);
                            } else {
                                let isValue = charBeforeFrom === '"' || charBeforeFrom === "'" || charBeforeFrom === '=';
                                if (!isValue && charAfterTo !== '=') {
                                    cm.replaceRange(cleanText + '=""', from, to);
                                    let cursor = cm.getCursor();
                                    cursor.ch -= 1; 
                                    cm.setCursor(cursor);
                                } else {
                                    cm.replaceRange(cleanText, from, to);
                                }
                            }
                        }
                    };
                }
            }
            return hints;
        };

        // 2. Initialize CodeMirror 
        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "htmlmixed",
            theme: "eclipse",
            lineNumbers: true,
            lineWrapping: true,
            tabSize: 2,
            autoCloseTags: {
                indentTags: ["applet", "blockquote", "body", "div", "dl", "fieldset", "form", "frameset", "head", "html", "iframe", "layer", "legend", "object", "ol", "select", "table", "ul"] 
            },
            autoCloseBrackets: true,
            matchBrackets: true,
            foldGutter: true,
            gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
            extraKeys: {
                "Tab": function(cm) {
                    if (cm.state.completionActive && cm.state.completionActive.widget) {
                        cm.state.completionActive.widget.pick();
                        return;
                    }
                    let cursor = cm.getCursor();
                    let line = cm.getLine(cursor.line);
                    let textBefore = line.substring(0, cursor.ch);
                    if (textBefore.match(/<[^>]*$/)) {
                        return CodeMirror.Pass; 
                    }
                    cm.execCommand("emmetExpandAbbreviation");
                },
                "Esc": "emmetResetAbbreviation",
                "Enter": "emmetInsertLineBreak",
                "Ctrl-Space": "autocomplete",
                "Ctrl-Q": function(cm){ cm.foldCode(cm.getCursor()); },
                // NEW: Keyboard shortcut for Beautify (Ctrl+Alt+F)
                "Ctrl-Alt-F": function() { document.getElementById('beautify-btn').click(); }
            }
        });

        if (typeof emmetCodeMirror === 'function') { emmetCodeMirror(editor); }

        // 3. Autocomplete Trigger
        editor.on("keyup", function (cm, event) {
            const excludedKeys = [8, 9, 13, 16, 17, 18, 20, 27, 35, 36, 37, 38, 39, 40, 46, 91, 92, 93];
            if (!cm.state.completionActive && !excludedKeys.includes(event.keyCode)) {
                CodeMirror.commands.autocomplete(cm, null, {completeSingle: false});
            }
        });

        // 4. Load saved code
        const SAVED_CODE_KEY = "liveEditorSavedCode";
        const savedCode = localStorage.getItem(SAVED_CODE_KEY);
        if (savedCode) { editor.setValue(savedCode); }

        // 5. Iframe Rendering
        const previewFrame = document.getElementById('preview-frame');
        function updatePreview() {
            try {
                const code = editor.getValue();
                localStorage.setItem(SAVED_CODE_KEY, code);
                const previewDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                previewDoc.open();
                previewDoc.write(code);
                previewDoc.close();
            } catch (e) {
                console.error("Iframe writing blocked: ", e);
            }
        }
        editor.on("change", updatePreview);
        setTimeout(() => { editor.refresh(); updatePreview(); }, 50);

        // NEW: 6. Beautify Button Logic
        document.getElementById('beautify-btn').addEventListener('click', () => {
            const unformattedCode = editor.getValue();
            
            // Format the code using js-beautify (handles HTML, inline CSS, and inline JS)
            const formattedCode = html_beautify(unformattedCode, {
                indent_size: 2,               // Matches our editor tab size
                space_in_empty_paren: true,
                preserve_newlines: true,
                max_preserve_newlines: 2,     // Removes giant empty gaps
                wrap_line_length: 120,        // Keeps lines from getting too long
                end_with_newline: true
            });
            
            // Replace editor content with beautiful code
            editor.setValue(formattedCode);
        });

        // 7. Download Button Logic
        document.getElementById('download-btn').addEventListener('click', () => {
            const code = editor.getValue();
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my-project.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // 8. Resizer Drag Logic
        const resizer = document.getElementById('resizer');
        const editorPane = document.getElementById('editor-pane');
        const renderPane = document.getElementById('render-pane');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            renderPane.style.pointerEvents = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = document.body.clientWidth;
            let newWidthPercentage = (e.clientX / containerWidth) * 100;
            if (newWidthPercentage < 10) newWidthPercentage = 10;
            if (newWidthPercentage > 90) newWidthPercentage = 90;
            editorPane.style.width = `${newWidthPercentage}%`;
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
                renderPane.style.pointerEvents = 'auto';
                editor.refresh(); 
            }
        });
    </script>
</body>
</html>
